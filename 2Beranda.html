<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beranda | Hidrolisis Garam</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg-primary:#f0f9ff;
    --bg-secondary:#ffffff;
    --text-primary:#1e293b;
    --text-secondary:#64748b;
    --accent:#06b6d4;
    --accent-hover:#0891b2;
    --shadow: rgba(6,182,212,0.15);
  }

  body {
    font-family:'Poppins', sans-serif;
    background:var(--bg-primary);
    color:var(--text-primary);
    min-height:100vh;
  }

  /* HEADER */
  .header {
    background: var(--bg-secondary);
    padding:1rem 2rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    box-shadow:0 2px 8px var(--shadow);
    z-index:1000;
  }

  .logo-section {
    display:flex;
    align-items:center;
    gap:1rem;
  }

  .logo-section img {
    width:50px;
    height:50px;
  }

  .nav-menu {
    display:flex;
    gap:1rem;
  }

  .nav-btn {
    background:transparent;
    border:2px solid var(--accent);
    border-radius:25px;
    padding:0.5rem 1.5rem;
    cursor:pointer;
    transition:0.3s;
    color:var(--text-primary);
    font-weight:500;
  }

  .nav-btn:hover {
    background: var(--accent);
    color:white;
    transform:translateY(-2px);
  }

  /* KONTEN */
  .container {
    max-width:900px;
    margin:3rem auto;
    padding:1rem;
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:1.5rem;
  }

  .menu-card {
    text-align:center;
    background: var(--bg-secondary);
    padding:2rem;
    border-radius:15px;
    box-shadow:0 4px 12px var(--shadow);
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
    min-height:170px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    text-decoration:none;
    color:var(--text-primary);
  }

  .menu-card:hover {
    border-color: var(--accent);
    background: var(--accent-hover);
    color:white;
    transform:translateY(-4px);
  }

  .menu-icon {
    font-size:2.5rem;
    margin-bottom:0.5rem;
  }

  .menu-title {
    font-size:1.4rem;
    margin-bottom:0.4rem;
  }

  .menu-desc {
    font-size:0.95rem;
    color: var(--text-secondary);
  }

  footer {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    text-align:center;
    padding:1.5rem 0;
    margin-top:3rem;
    box-shadow:0 -2px 8px var(--shadow);
  }

/* === RESPONSIVE_GLOBAL_START === */
html, body { max-width: 100%; overflow-x: hidden; }
img, video, canvas, iframe { max-width: 100%; height: auto; }
/* === RESPONSIVE_GLOBAL_END === */


/* === NAV_UNIFORM_START === */
.nav-menu{
  display:flex;
  gap:.5rem;
  flex-wrap:wrap;
  justify-content:flex-end;
  align-items:center;
}
.nav-menu .nav-btn{
  appearance:none;
  border:0;
  cursor:pointer;
  border-radius:999px;
  padding:.55rem .95rem;
  font-size:.95rem !important;
  font-weight:500 !important;
  line-height:1.1;
  white-space:nowrap;
}
@media (max-width:600px){
  .nav-menu{ justify-content:center; }
  .nav-menu .nav-btn{
    padding:.5rem .8rem;
    font-size:.9rem !important;
  }
}
/* === NAV_UNIFORM_END === */

/* === BERANDA_GRID_START === */

@media (max-width: 600px){
  .container{ grid-template-columns: 1fr; }
}
/* === BERANDA_GRID_END === */

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-section">
    <img src="logo um rev.png" alt="Logo UM">
  </div>

  <div class="nav-menu">
    <button class="nav-btn" onclick="history.back()">← Kembali</button>
    <button class="nav-btn" onclick="location.href='2Beranda.html'">🏠 Beranda</button>
    <button class="nav-btn" onclick="location.href='2Profil.html'">👤 Profil</button>
  </div>
</div>

<!-- MENU UTAMA -->
<div class="container">
  <a href="3Materi.html" class="menu-card">
    <div class="menu-icon">📘</div>
    <h3 class="menu-title">Materi</h3>
    <p class="menu-desc">Materi Hidrolisis Garam</p>
  </a>

  <a href="3Kuis.html" class="menu-card">
    <div class="menu-icon">❔</div>
    <h3 class="menu-title">Kuis</h3>
    <p class="menu-desc">Kuis Hidrolisis Garam</p>
  </a>

  <a href="3Glosarium.html" class="menu-card">
    <div class="menu-icon">📖</div>
    <h3 class="menu-title">Glosarium</h3>
    <p class="menu-desc">Kamus istilah dalam Hidrolisis Garam</p>
  </a>
  
  <a href="3Daftar Pustaka.html" class="menu-card">
    <div class="menu-icon">📑</div>
    <h3 class="menu-title">Daftar Pustaka</h3>
    <p class="menu-desc">Referensi dan sumber belajar</p>
  </a>


</div>

<footer>&copy; 2026 Tsary ▏ Sumari ▏ Departemen Kimia ▏  Universitas Negeri Malang</footer>

</body>
</html>
